name: QA Automation Pipeline

# 1. TETİKLEYİCİ: Bu sistem ne zaman çalışsın?
on:
  push:
    branches:
      - main # Sadece 'main' dalına yeni kod geldiğinde çalış.

jobs:
  test-calistirma-gorevi:
    # 2. ORTAM: Hangi işletim sisteminde çalışsın? (En hızlısı ve ucuzu Linux'tur)
    runs-on: ubuntu-latest

    # 3. ADIMLAR: Sırasıyla ne yapsın?
    steps:
    - name: Adim 1 - Kodlari Buluttan Al
      uses: actions/checkout@v4

    - name: Adim 2 - Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Adim 3 - Kutuphaneleri Yukle (Requirements)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Adim 4 - Sihirli Komut (Testleri Calistir)
      run: pytest -v -s